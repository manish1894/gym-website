
  <header class="navbar">
    <div class="logo">
      FLEX<span>GYM</span>
    </div>
    <nav class="nav-links">
      <a href="#">HOME</a>
      <a href="#">FEATURES</a>
      <a href="#">ABOUT</a>
    </nav>
    <button class="join-btn">JOIN NOW</button>
    </header>
    <section class="services-container">
      <h2 class="section-title">Our Special <span>SERVICES</span></h2>
      <div class="services-grid">
        @for (service of gymServices; track service.title){
          <div class="service-card">
            <div class="service-icon">
              <span class="material-icons">{{service.icon}}</span>
            </div>
            <h3>{{service.title}}</h3>
            <p>{{service.description }}</p>
            <a href="#" class="read-more">Read More -></a>
          </div>
        }
      </div>
    </section>
